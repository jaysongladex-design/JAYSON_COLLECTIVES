<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collectives Back Office</title>
<style>
  :root{
    --navy:#0B2A4A; --navy2:#0F355E; --blue:#1E5AA8; --blue2:#3B82C4;
    --gold:#C9A227; --gold2:#D4AF37; --gold3:#E9C46A;
    --bg:#EEF2F8; --panel:#fff; --ink:#0E2136; --muted:#5B6B7F; --line:#E1E8F2;
    --green:#1FA971; --amber:#E1A128; --red:#D9534F;
    --shadow:0 6px 22px rgba(11,42,74,.08); --shadow2:0 2px 10px rgba(11,42,74,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit}

  /* Header */
  header.topbar{background:linear-gradient(120deg,var(--navy),var(--navy2) 60%,#123c69);color:#fff;border-bottom:4px solid var(--gold);box-shadow:var(--shadow);padding:14px 20px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy);font-size:16px}
  .brand h1{margin:0;font-size:17px;letter-spacing:.3px}
  .brand p{margin:2px 0 0;font-size:11.5px;color:#B9CBE0;letter-spacing:.4px}
  .actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .btn{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer}
  .btn:hover{background:rgba(255,255,255,.18)}
  .btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy);border-color:transparent}
  .btn.danger{background:rgba(217,83,79,.25);border-color:rgba(217,83,79,.5)}
  .saved{font-size:12px;color:#B9CBE0;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}

  /* Layout */
  .app{display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:1500px;margin:0 auto;padding:16px 20px 60px;align-items:start}
  @media(max-width:900px){ .app{grid-template-columns:1fr} }

  /* Sidebar */
  .sidebar{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow2);padding:12px;position:sticky;top:88px;max-height:calc(100vh - 110px);overflow:auto}
  .search{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;margin-bottom:10px}
  .search:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,196,.15)}
  /* dashboard dropdown: click -> packages pop up -> pick one -> dashboard appears */
  .dd{position:relative;margin-bottom:12px}
  .dd-btn{width:100%;text-align:left;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border:none;border-radius:10px;padding:10px 30px 10px 12px;font-size:12.5px;font-weight:700;cursor:pointer;position:relative}
  .dd-btn:hover{filter:brightness(1.12)}
  .dd-btn::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gold3);font-size:11px}
  .dd-btn.open::after{content:"▴"}
  .dd-btn .sub{display:block;font-size:9.5px;color:#9FB6CE;font-weight:600;margin-top:2px;letter-spacing:.3px}
  .dd-panel{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:6px;max-height:300px;overflow:auto;z-index:70;display:none}
  .dd-panel.open{display:block}
  .dd-opt{width:100%;text-align:left;background:none;border:none;border-radius:7px;padding:8px 9px;cursor:pointer;font-size:12.5px;color:var(--ink);display:flex;justify-content:space-between;gap:8px;align-items:center;font-family:inherit}
  .dd-opt:hover{background:#F2F7FD}
  .dd-opt.active{background:var(--navy);color:#fff}
  .dd-opt .c{font-size:10px;color:var(--muted);background:#EEF2F8;border-radius:20px;padding:1px 7px;font-weight:700;flex:0 0 auto}
  .dd-opt.active .c{background:rgba(255,255,255,.22);color:#fff}
  .dd-opt.all{font-weight:800;border-bottom:1px solid var(--line);margin-bottom:4px;padding-bottom:9px}
  /* sell-through bar on the main-panel dashboard */
  .pbar{height:8px;border-radius:4px;background:#E8EDF5;overflow:hidden;margin-top:12px}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3))}
  .side-stats{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:12px;padding:12px;margin-bottom:12px;color:#fff}
  .side-stats h5{margin:0;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold3);font-weight:800}
  .side-stats .scope{font-size:10.5px;color:#9FB6CE;margin:2px 0 9px}
  .ss-chips{display:flex;gap:6px;margin-bottom:9px}
  .ss-chip{flex:1;background:rgba(255,255,255,.09);border-radius:7px;padding:6px 4px;text-align:center}
  .ss-chip .n{font-size:15px;font-weight:800;line-height:1.1}
  .ss-chip .t{font-size:8.5px;color:#9FB6CE;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
  .ss-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:4px 0;font-size:11.5px}
  .ss-row .l{color:#B9CBE0;white-space:nowrap}
  .ss-row .v{font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
  .ss-row .v.g{color:#5EE0A8}.ss-row .v.r{color:#FF9B97}.ss-row .v.gold{color:var(--gold3)}
  .ss-sep{height:1px;background:rgba(255,255,255,.14);margin:7px 0}
  .ss-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.15);overflow:hidden;margin-top:7px}
  .ss-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold3))}
  .pkg{margin-bottom:6px}
  .pkg-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;background:#F6F9FD;border:1px solid var(--line);border-radius:9px;padding:9px 10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--navy)}
  .pkg-btn:hover{background:#EDF3FA}
  .pkg-btn .cnt{background:var(--navy);color:#fff;border-radius:20px;font-size:10.5px;padding:1px 7px;font-weight:700}
  .pkg-btn .chev{color:var(--muted);font-size:10px}
  .codes{padding:6px 0 6px 8px;border-left:2px solid var(--line);margin:6px 0 8px 8px;display:flex;flex-direction:column;gap:4px}
  .code-btn{text-align:left;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px;cursor:pointer;font-size:12.5px;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .code-btn:hover{background:#F6F9FD}
  .code-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
  .code-btn.active .sub{color:#B9CBE0}
  .code-btn .sub{font-size:10.5px;color:var(--muted)}
  .add-btn{background:#fff;border:1px dashed var(--blue2);color:var(--blue);border-radius:8px;padding:7px 9px;cursor:pointer;font-size:12px;font-weight:700}
  .add-btn:hover{background:#F2F8FF}
  .add-pkg{width:100%;margin-top:8px}

  /* Editor */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow2);padding:16px;margin-bottom:16px}
  .card h3{margin:0 0 3px;font-size:14px;color:var(--navy)}
  .card .sub{margin:0 0 12px;font-size:11.5px;color:var(--muted)}
  .ed-head{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .ed-head h2{margin:0;font-size:16px}
  .ed-head .code{font-size:12.5px;color:var(--gold3);font-weight:700;margin-top:2px}
  /* status tag: PENDING=green, VOID=black, FINISHED=blue */
  .st{font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-radius:20px;
      padding:7px 14px;border:2px solid rgba(255,255,255,.35);color:#fff;cursor:pointer;font-family:inherit;
      appearance:none;-webkit-appearance:none;text-align:center;background-image:none}
  .st:disabled,.st.badge{cursor:default;opacity:1}
  .st-pending{background:#1FA971}
  .st-void{background:#11151C}
  .st-finished{background:#1E5AA8}
  .st option{background:#fff;color:var(--ink);font-weight:700}
  .st-wrap{display:flex;align-items:center;gap:8px}
  .st-wrap .lbl{font-size:9.5px;color:#9FB6CE;font-weight:700;letter-spacing:.4px;text-align:right;line-height:1.3}
  .btn-void{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 11px;
            border-radius:8px;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit;white-space:nowrap}
  .btn-void:hover{background:rgba(17,21,28,.85);border-color:#11151C}
  /* small dot version for the tree + tables */
  .stdot{display:inline-block;width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .stdot.st-pending{background:#1FA971}.stdot.st-void{background:#11151C}.stdot.st-finished{background:#1E5AA8}
  .sttag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.3px;
         padding:2px 8px;border-radius:20px;text-transform:uppercase;color:#fff}
  .sttag.st-pending{background:#1FA971}.sttag.st-void{background:#11151C}.sttag.st-finished{background:#1E5AA8}
  tr.voided td{opacity:.5}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
  label.f{display:flex;flex-direction:column;gap:4px}
  label.f>span{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  label.f input,label.f select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);width:100%}
  label.f input:focus,label.f select:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,196,.15)}
  label.f select{font-weight:600;color:var(--navy);cursor:pointer}
  /* frozen / locked fields */
  label.f input:disabled,label.f select:disabled{background:#F4F7FB;color:#33465C;border-color:#E8EDF5;cursor:default;opacity:1;-webkit-text-fill-color:#33465C}
  .ed-actions{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line);flex-wrap:wrap}
  .btn-edit{border:none;border-radius:9px;padding:9px 18px;font-weight:700;font-size:12.5px;cursor:pointer;background:var(--navy);color:#fff}
  .btn-edit:hover{background:var(--navy2)}
  .btn-edit.done{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy)}
  .lock-hint{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .lock-hint.on{color:var(--green);font-weight:600}
  .full{background:rgba(31,169,113,.1);border:1px solid rgba(31,169,113,.35);color:#12704a;border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:600;text-align:center;margin-top:12px}
  .full.warn{background:rgba(217,83,79,.09);border-color:rgba(217,83,79,.4);color:#96322e}

  /* user chip + role badges */
  .who{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:5px 11px 5px 6px;font-size:12px;color:#fff}
  .who .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10.5px}
  .role{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 6px;border-radius:20px}
  .role.admin{background:rgba(201,162,39,.9);color:var(--navy)}
  .role.regular{background:rgba(255,255,255,.22);color:#fff}
  .role.dark{background:var(--navy);color:#fff}
  .role.dark.admin{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy)}

  /* settings modal */
  .ovl{position:fixed;inset:0;background:rgba(11,42,74,.55);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:70px 16px 24px;overflow:auto}
  .ovl.open{display:flex}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 24px 60px rgba(11,42,74,.35);width:100%;max-width:640px}
  .modal-h{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:16px 16px 0 0;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .modal-h h2{margin:0;font-size:16px}
  .modal-h p{margin:2px 0 0;font-size:11.5px;color:#B9CBE0}
  .x{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;line-height:1}
  .x:hover{background:rgba(255,255,255,.25)}
  .modal-b{padding:18px}
  .sec{margin-bottom:20px}
  .sec h4{margin:0 0 3px;font-size:12px;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
  .sec p.h{margin:0 0 10px;font-size:11.5px;color:var(--muted)}
  .u-row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:7px}
  .u-row.me{border-color:var(--blue2);background:#F4F9FF}
  .u-l{display:flex;align-items:center;gap:9px}
  .u-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}
  .u-av.admin{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--navy)}
  .u-n{font-weight:700;color:var(--navy);font-size:13px}
  .u-s{font-size:11px;color:var(--muted)}
  .u-form{display:grid;grid-template-columns:1fr 140px auto;gap:8px;align-items:end}
  @media(max-width:560px){ .u-form{grid-template-columns:1fr} }
  .perm{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .perm table{font-size:12px}
  .perm thead th{background:#F3F6FB;color:var(--navy);padding:8px 10px;font-size:10.5px}
  .perm td{padding:7px 10px;border-bottom:1px solid var(--line)}
  .yes{color:var(--green);font-weight:800}
  .no{color:var(--red);font-weight:800}
  .warnbox{background:#FFF6E5;border:1px solid var(--gold3);color:#7a5a10;border-radius:10px;padding:10px 12px;font-size:11.5px;line-height:1.5}
  .warnbox b{color:#5c4409}
  label.f small{font-size:10.5px;color:var(--muted)}

  /* Derived tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .tile{background:#F6F9FD;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .tile .t-l{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .tile .t-v{font-size:16px;font-weight:800;color:var(--navy);margin-top:3px}
  .tile.gold .t-v{color:#8a6d0b}
  .tile.green .t-v{color:var(--green)}
  .tile.red .t-v{color:var(--red)}

  /* Payments */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{background:var(--navy);color:#fff;text-align:left;padding:9px 10px;font-size:11px;font-weight:600;white-space:nowrap}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--line)}
  tbody tr:hover{background:#F6F9FD}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pay-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;align-items:end;margin-top:12px}
  .pay-form .btn-add{align-self:end}
  @media(max-width:700px){ .pay-form{grid-template-columns:1fr} }
  .pay-form input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;width:100%}
  .btn-add{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap}
  .btn-add:hover{background:var(--navy2)}
  .btn-x{background:none;border:none;color:var(--red);cursor:pointer;font-weight:800;font-size:14px;padding:2px 6px;border-radius:5px}
  .btn-x:hover{background:rgba(217,83,79,.12)}
  .totrow td{background:#F3F6FB;font-weight:800;color:var(--navy);border-top:2px solid var(--line)}
  .empty{color:var(--muted);text-align:center;padding:18px;font-size:12.5px}

  .blank{background:var(--panel);border:1px dashed var(--line);border-radius:14px;padding:60px 20px;text-align:center;color:var(--muted)}
  .blank h2{color:var(--navy);margin:0 0 6px;font-size:17px}
  .note{background:#FBFCFE;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--muted);margin-top:10px}
  .note b{color:var(--navy)}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">₱C</div>
    <div>
      <h1>Collectives Back Office</h1>
      <p>INTL COLLECTIVES · EDIT · UPDATE · PAYMENT LOG</p>
    </div>
  </div>
  <div class="actions">
    <span class="saved" id="saveStatus"><i class="dot"></i> Saved</span>
    <button class="btn" onclick="exportCSV()">⤓ Export CSV</button>
    <button class="btn" onclick="exportPayments()">⤓ Payments CSV</button>
    <button class="btn admin-only" onclick="document.getElementById('csvInput').click()">⬆ Import CSV</button>
    <button class="btn danger admin-only" onclick="resetAll()">↺ Reset to file data</button>
    <span class="who" id="whoChip"></span>
    <button class="btn gold" onclick="openSettings()">⚙ Settings</button>
    <input type="file" id="csvInput" accept=".csv" style="display:none" />
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <input class="search" id="search" placeholder="Search package or tour code…" />
    <div class="dd" id="statsDD">
      <button class="dd-btn" id="statsBtn"></button>
      <div class="dd-panel" id="statsPanel"></div>
    </div>
    <div id="tree"></div>
    <button class="add-btn add-pkg admin-only" onclick="newPackage()">＋ New Package</button>
  </aside>
  <main id="editor"></main>
</div>

<div class="ovl" id="settingsOvl">
  <div class="modal" role="dialog" aria-label="Settings">
    <div class="modal-h">
      <div><h2>⚙ Settings</h2><p>Users &amp; access control</p></div>
      <button class="x" onclick="closeSettings()" title="Close">✕</button>
    </div>
    <div class="modal-b" id="settingsBody"></div>
  </div>
</div>

const PESO = "₱";
// Half a centavo. Money is stored as floats, so a fully-settled balance can land on
// 0.0000000000582 instead of 0 and still *display* as ₱0.00 — compare against this,
// never against 0, or "no remaining balance" checks silently fail.
const CENT = 0.005;

/* ============================== helpers ============================== */
const uid = () => "e" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const num = (v) => { const n = Number(v); return isFinite(n) ? n : 0; };
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const money = (n) => (n < 0 ? "-" + PESO : PESO) + Math.abs(num(n)).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
/** whole numbers with thousand separators: 1803 -> "1,803" */
const qty = (n) => num(n).toLocaleString("en-US");

/* ===== departure status =====
 * PENDING  = the travel date hasn't happened yet   (automatic)
 * FINISHED = the travel date is done               (automatic)
 * VOID     = voided                                (set by an admin)
 * Only VOID is stored. PENDING/FINISHED are derived from the travel date every
 * render, so a departure flips to FINISHED by itself the day the trip ends.
 */
const STATUSES = ["PENDING", "FINISHED", "VOID"];
/** End of the travel range: "5/16/2026 - 5/21/2026" -> 21 May 2026. */
function travelEndOf(e) {
  const raw = ("" + ((e && e.travelRaw) || "")).trim();
  if (!raw) return null;
  const parts = raw.split(/\s+-\s+/);            // space-dash-space, so "5/16/2026" stays intact
  const last = (parts[parts.length - 1] || "").trim();
  const d = new Date(last);                       // "5/21/2026" / "01/02/2027"
  if (isNaN(d)) return null;
  d.setHours(0, 0, 0, 0);
  return d;
}
const startOfToday = () => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; };
function stOf(e) {
  if (e && e.voided) return "VOID";
  const end = travelEndOf(e);
  if (!end) return "PENDING";                     // no usable travel date -> treat as upcoming
  return end < startOfToday() ? "FINISHED" : "PENDING";
}
const stClass = (s) => (s === "VOID" ? "st-void" : s === "FINISHED" ? "st-finished" : "st-pending");
const parseD = (s) => (s ? new Date(s + "T00:00:00") : null);
const daysBetween = (a, b) => Math.max(0, Math.round((b - a) / 86400000));
const todayISO = () => new Date().toISOString().slice(0, 10);

const ADMIN_ID = "u-admin-default";
function seedDB() {
  return {
    version: 1,
    updatedAt: new Date().toISOString(),
    users: [{ id: ADMIN_ID, name: "Administrator", role: "admin" }],
    currentUserId: ADMIN_ID,
    adminPin: "",
    entries: SEED.map((r) => ({
      id: uid(),
      package: r.package || "",
      tourCode: r.tourCode || "",
      travelRaw: r.travelRaw || "",
      holdingDate: r.holdingDate || "",
      soldOutDate: r.soldOutDate || "",
      amountPerPax: r.amountPerPax ?? null,
      expProfitPerPerson: r.expProfitPerPerson ?? null,
      estProfitPerDeparture: r.estProfitPerDeparture ?? null,
      totalCost: r.totalCost ?? 0,
      slot: r.slot ?? 0,
      foc: r.foc ?? 0,
      remainingBalanceToCollect: r.remainingBalanceToCollect ?? null,
      voided: false, // PENDING/FINISHED come from the travel date; only VOID is stored
      payments:
        r.openingPayment && num(r.openingPayment) !== 0
          ? [{ id: uid(), date: r.holdingDate || "", amount: num(r.openingPayment), note: "Opening payment (imported from file)" }]
          : [],
      // Slot Sold + Collected are derived from this log. The file's figures are
      // seeded as one opening entry so totals stay exactly as they are today.
      sales:
        num(r.slotSold) !== 0 || num(r.collected) !== 0
          ? [{ id: uid(), date: r.holdingDate || "", slots: num(r.slotSold), amount: num(r.collected), note: "Opening sale (imported from file)" }]
          : [],
    })),
  };
}
/** Bring any stored/imported entry up to the current shape (adds the sales log). */
function migrateEntry(e) {
  if (!e || typeof e !== "object") return null;
  // older saves used a manual `status` string; keep only the VOID part
  if (typeof e.voided !== "boolean") e.voided = e.status === "VOID";
  delete e.status; // PENDING/FINISHED are derived from the travel date now
  if (!Array.isArray(e.payments)) e.payments = [];
  if (!Array.isArray(e.sales)) {
    const slots = num(e.slotSold), amount = num(e.collected);
    e.sales = slots !== 0 || amount !== 0
      ? [{ id: uid(), date: e.holdingDate || "", slots, amount, note: "Opening sale (imported from file)" }]
      : [];
  }
  delete e.slotSold; delete e.collected; // now derived from e.sales
  return e;
}
/** Ensure the users/roles block exists and stays coherent (never zero admins). */
function migrateUsers(d) {
  if (!Array.isArray(d.users) || !d.users.length) {
    d.users = [{ id: ADMIN_ID, name: "Administrator", role: "admin" }];
    d.currentUserId = ADMIN_ID;
  }
  d.users.forEach((u) => { if (u.role !== "admin" && u.role !== "regular") u.role = "regular"; });
  if (!d.users.some((u) => u.role === "admin")) d.users[0].role = "admin"; // never lock everyone out
  if (!d.users.some((u) => u.id === d.currentUserId)) d.currentUserId = d.users[0].id;
  if (typeof d.adminPin !== "string") d.adminPin = "";
  return d;
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && Array.isArray(d.entries)) { d.entries = d.entries.map(migrateEntry).filter(Boolean); return migrateUsers(d); }
    }
  } catch (e) { console.warn("load failed", e); }
  return seedDB();
}

/* ============================== derive ============================== */
function derive(e) {
  const totalSlots = num(e.slot) + num(e.foc);
  const paid = (e.payments || []).reduce((s, p) => s + num(p.amount), 0);
  const slotSold = (e.sales || []).reduce((s, x) => s + num(x.slots), 0);
  const collected = (e.sales || []).reduce((s, x) => s + num(x.amount), 0);
  const balance = num(e.totalCost) - paid;
  const remaining = totalSlots - slotSold;
  const profit = collected - paid;
  const roi = num(e.totalCost) ? (profit / num(e.totalCost)) * 100 : 0;
  const hold = parseD(e.holdingDate), out = parseD(e.soldOutDate);
  const daysToSoldOut = hold && out ? daysBetween(hold, out) : null;
  const sellingDays = daysToSoldOut != null ? Math.max(1, daysToSoldOut) : hold ? Math.max(1, daysBetween(hold, new Date())) : 1;
  const perDay = slotSold > 0 ? slotSold / sellingDays : 0;
  return { totalSlots, paid, slotSold, collected, balance, remaining, profit, roi, daysToSoldOut, perDay, perWeek: perDay * 7 };
}

function packagesOf(entries) {
  const m = new Map();
  entries.forEach((e) => { const k = e.package || "(no package)"; if (!m.has(k)) m.set(k, []); m.get(k).push(e); });
  return [...m.entries()].sort((a, b) => a[0].localeCompare(b[0]));
}

/**
 * kind: "money" | "int" | "text" | "date"
 * Frozen  -> a text box showing the value with thousand separators (readable).
 * Editing -> a real number box with the raw value (type="number" can't hold commas).
 */
const F = (label, key, kind, val, hint) => {
  const isNum = kind === "money" || kind === "int";
  let type = kind === "date" ? "date" : kind === "text" ? "text" : "number";
  let v = val ?? "";
  if (!editing && isNum) {
    type = "text";
    v = val === null || val === undefined || val === "" ? "" : kind === "money" ? money(val) : qty(val);
  }
  return `<label class="f"><span>${label}</span>
     <input data-field="${key}" type="${type}" ${type === "number" ? 'step="any"' : ""} value="${esc(v)}" ${editing ? "" : "disabled"}>
     ${hint ? `<small>${hint}</small>` : ""}</label>`;
};

/* ============================== CSV ============================== */
const cell = (v) => { v = v == null ? "" : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
function dl(fn, content) {
  const b = new Blob([content], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = fn; a.click(); URL.revokeObjectURL(a.href);
}
function exportCSV() {
  const head = ["PACKAGE","TOUR CODE","STATUS","TRAVEL DATE","AMOUNT PER PAX BEFORE COMMI","EXPECTED PROFIT / person","ESTIMATED PROFIT PER DEPARTURE","HOLDING DATE","TOTAL COST","CURRENT PAYMENT TO SUPPLIER","BALANCE PAYABLE TO SUPPLIER","SLOT","FOC","TOTAL SLOTS","SOLD OUT DATE","#OF DAYS TO SOLD OUT","SLOT SOLD","REMAINING SLOT","COLLECTED FROM PAX","REMAINING BALANCE TO COLLECT","PROFIT","ROI","PER DAY","PER WEEK"];
  const lines = DB.entries.map((e) => { const d = derive(e);
    return [e.package,e.tourCode,stOf(e),e.travelRaw,e.amountPerPax,e.expProfitPerPerson,e.estProfitPerDeparture,e.holdingDate,
      num(e.totalCost).toFixed(2), d.paid.toFixed(2), d.balance.toFixed(2), e.slot, e.foc, d.totalSlots, e.soldOutDate,
      d.daysToSoldOut ?? "", d.slotSold, d.remaining, d.collected.toFixed(2), e.remainingBalanceToCollect ?? "",
      d.profit.toFixed(2), d.roi.toFixed(2) + "%", d.perDay.toFixed(2), d.perWeek.toFixed(2)].map(cell).join(",");
  });
  dl("collectives-backend-export.csv", [head.join(","), ...lines].join("\n"));
}
function exportPayments() {
  const head = ["PACKAGE","TOUR CODE","PAYMENT DATE","AMOUNT","NOTE"];
  const lines = [];
  DB.entries.forEach((e) => (e.payments || []).forEach((p) =>
    lines.push([e.package, e.tourCode, p.date, num(p.amount).toFixed(2), p.note].map(cell).join(","))));
  dl("collectives-payments-export.csv", [head.join(","), ...lines].join("\n"));
}
function parseCSV(t) {
  const rows = []; let cur = [], val = "", q = false;
  for (let i = 0; i < t.length; i++) { const c = t[i];
    if (q) { if (c === '"') { if (t[i + 1] === '"') { val += '"'; i++; } else q = false; } else val += c; }
    else { if (c === '"') q = true; else if (c === ",") { cur.push(val); val = ""; }
      else if (c === "\n") { cur.push(val); rows.push(cur); cur = []; val = ""; } else if (c !== "\r") val += c; } }
  if (val !== "" || cur.length) { cur.push(val); rows.push(cur); }
  return rows.filter((r) => r.some((c) => c.trim() !== ""));
}
const toNum = (s) => { s = String(s ?? "").replace(/[₱",%\s]/g, "").trim(); if (s === "") return null; const v = parseFloat(s); return isNaN(v) ? null : v; };
const toDate = (s) => { s = String(s ?? "").trim(); if (!s) return "";
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) { let y = m[3]; if (y.length === 2) y = "20" + y; return `${y}-${String(m[1]).padStart(2, "0")}-${String(m[2]).padStart(2, "0")}`; }
  return ""; };
function importCSV(text) {
  if (!isAdmin()) { alert(DENY); return; }
  const rows = parseCSV(text); if (rows.length < 2) { alert("CSV appears empty."); return; }
  const head = rows[0].map((h) => h.trim().toLowerCase());
  const idx = (names) => { for (const n of names) { const i = head.indexOf(n); if (i >= 0) return i; } return -1; };
  const iPkg = idx(["package"]), iCode = idx(["tour code"]), iTrav = idx(["travel date"]),
    iAmt = idx(["amount per pax before commi"]), iEpp = idx(["expected profit / person"]),
    iEpd = idx(["estimated profit per departure"]), iHold = idx(["holding date"]),
    iCost = idx(["total cost"]), iPay = idx(["current payment to supplier"]),
    iSlot = idx(["slot"]), iFoc = idx(["foc"]), iOut = idx(["sold out date"]),
    iSold = idx(["slot sold"]), iColl = idx(["collected from pax"]), iRem = idx(["remaining balance to collect"]);
  if (iPkg < 0 || iSlot < 0) { alert("CSV needs at least PACKAGE and SLOT columns."); return; }
  const g = (row, i) => (i >= 0 ? (row[i] || "").trim() : "");
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r]; const pkg = g(row, iPkg); if (!pkg) continue;
    const open = toNum(g(row, iPay));
    const hold = toDate(g(row, iHold));
    const sold = toNum(g(row, iSold)) ?? 0;
    const coll = toNum(g(row, iColl)) ?? 0;
    out.push({ id: uid(), package: pkg, tourCode: g(row, iCode), travelRaw: g(row, iTrav), holdingDate: hold,
      soldOutDate: toDate(g(row, iOut)), amountPerPax: toNum(g(row, iAmt)), expProfitPerPerson: toNum(g(row, iEpp)),
      estProfitPerDeparture: toNum(g(row, iEpd)), totalCost: toNum(g(row, iCost)) ?? 0,
      slot: toNum(g(row, iSlot)) ?? 0, foc: toNum(g(row, iFoc)) ?? 0,
      remainingBalanceToCollect: toNum(g(row, iRem)),
      payments: open ? [{ id: uid(), date: hold, amount: open, note: "Opening payment (imported)" }] : [],
      sales: (sold !== 0 || coll !== 0) ? [{ id: uid(), date: hold, slots: sold, amount: coll, note: "Opening sale (imported)" }] : [] });
  }
  if (!out.length) { alert("No valid rows found."); return; }
  if (!confirm(`Replace all current data with ${out.length} rows from this CSV?`)) return;
  DB = { version: 1, updatedAt: new Date().toISOString(), entries: out };
  sel = { id: null, pkg: null, q: "" };
  save(); renderTree(); renderEditor();
  alert("Imported " + out.length + " entries.");
}
document.getElementById("csvInput").addEventListener("change", (ev) => {
  const f = ev.target.files[0]; if (!f) return;
  const rd = new FileReader(); rd.onload = (x) => importCSV(x.target.result); rd.readAsText(f); ev.target.value = "";
});

document.getElementById("editor").addEventListener("input", (ev) => {
  if (ev.target.tagName === "SELECT") return; // dropdowns handled by the change listener below
  const key = ev.target.dataset.field; if (!key) return;
  if (!isAdmin()) return; // fields are disabled for regular users; this is the backstop
  const e = current(); if (!e) return;
  e[key] = ev.target.type === "number" ? (ev.target.value === "" ? null : Number(ev.target.value)) : ev.target.value;
  save(); renderDerived();
  if (key === "package" || key === "tourCode") {
    if (key === "package") sel.pkg = e.package;
    document.querySelector(".ed-head h2").textContent = e.package || "(no package)";
    document.querySelector(".ed-head .code").textContent = e.tourCode || "(untitled)";
    renderTree();
  }
});
document.getElementById("editor").addEventListener("change", (ev) => {
  if (ev.target.tagName !== "SELECT") return;
  if (ev.target.dataset.field !== "package") return;
  if (!isAdmin()) { alert(DENY); return; }
  const e = current(); if (!e) return;
  const v = ev.target.value;
  if (v === "__new__") {
    const name = prompt("New package name:");
    if (name && name.trim()) e.package = name.trim();
    // if cancelled, re-rendering below restores the previous selection
  } else {
    e.package = v;
  }
  save(); sel.pkg = e.package; renderTree(); renderEditor();
});
document.getElementById("editor").addEventListener("click", (ev) => {
  const open = ev.target.closest("[data-open]");            // dashboard table row -> open that departure
  if (open) return selectEntry(open.dataset.open);
  const v = ev.target.closest("[data-void]");               // VOID is the only manual status
  if (v) {
    if (!isAdmin()) { alert(DENY); return; }
    const e = current(); if (!e) return;
    if (v.dataset.void === "1") {
      if (!confirm(`Mark "${e.tourCode || "(untitled)"}" as VOID?\n\nIt stays on file with its full payment history, but drops out of the package dashboard totals.`)) return;
      e.voided = true;
    } else {
      e.voided = false; // back to PENDING/FINISHED, decided by the travel date
    }
    save(); renderEditor(); renderTree(); return;
  }
  if (ev.target.closest("[data-toggleedit]")) {
    if (!isAdmin()) { alert(DENY); return; }
    editing = !editing; renderEditor(); return;
  }
  if (ev.target.closest("[data-addpay]")) return addPayment();
  if (ev.target.closest("[data-addsale]")) return addSale();
  const dp = ev.target.closest("[data-delpay]");
  if (dp) return deletePayment(dp.dataset.delpay);
  const ds = ev.target.closest("[data-delsale]");
  if (ds) return deleteSale(ds.dataset.delsale);
});
document.getElementById("search").addEventListener("input", (ev) => { sel.q = ev.target.value; renderTree(); });

/* dashboard dropdown: button toggles the package list; picking one shows its dashboard */
document.getElementById("statsBtn").addEventListener("click", (ev) => {
  ev.stopPropagation(); statsOpen = !statsOpen; renderStatsDD();
});
document.getElementById("statsPanel").addEventListener("click", (ev) => {
  const b = ev.target.closest("[data-statpkg]"); if (!b) return;
  ev.stopPropagation();
  statsPkg = b.dataset.statpkg; statsOpen = false;
  sel.id = null; editing = false;              // drop the tour code so the dashboard takes the main panel
  if (statsPkg !== "__ALL__") sel.pkg = statsPkg; // expand that package in the tree too
  renderStatsDD(); renderTree(); renderEditor();
});
document.addEventListener("click", () => { if (statsOpen) { statsOpen = false; renderStatsDD(); } });

/* ============================== boot ============================== */
renderWho();
renderTree();
renderEditor();
console.log("[back office] entries:", DB.entries.length);
</script>
